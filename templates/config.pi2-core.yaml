# Hermes Agent Pi2 core profile
# Native-compatible: source code and package metadata stay upstream-shaped;
# this config only disables heavy/default-unneeded toolsets on 1GB RAM.

model: ""
providers: {}
fallback_providers: []
toolsets:
  - hermes-cli

agent:
  max_turns: 60
  gateway_timeout: 900
  restart_drain_timeout: 60
  api_max_retries: 2
  # Low-resource override for local Ollama/llama.cpp use. Upstream Hermes
  # defaults to a 64K runtime-context floor for reliable full tool use; the
  # Pi2 core profile keeps the tool surface tiny, so 2K is allowed as a
  # degraded/local-chat baseline.
  minimum_tool_context_length: 2048
  tool_use_enforcement: auto
  task_completion_guidance: true
  environment_probe: true
  coding_context: auto
  image_input_mode: text
  disabled_toolsets:
    - browser
    - image_gen
    - video
    - video_gen
    - tts
    - computer_use
    - homeassistant
    - messaging
    - spotify
    - discord
    - discord_admin
    - feishu_doc
    - feishu_drive
    - yuanbao
    - moa
    - rl

terminal:
  backend: local
  cwd: .
  timeout: 120
  home_mode: auto

memory:
  memory_enabled: true
  user_profile_enabled: true
  write_approval: false
  memory_char_limit: 1600
  user_char_limit: 1000
  provider: ""

display:
  show_cost: false
  show_reasoning: false

stt:
  enabled: false

tts:
  provider: edge

browser:
  engine: auto

compression:
  enabled: true
  threshold: 0.45
  target_ratio: 0.20
